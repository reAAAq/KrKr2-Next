name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight
  workflow_dispatch: # click the button on Github repo!

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: reAAAq/KrKr2-Next
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set

          # Set test_mode true to run tests instead of the real diff and sync.
          test_mode: false

      - name: Sync check
        if: success()
        run: |
          if [ "${{ steps.sync.outputs.has_new_commits }}" = "true" ]; then
            echo "New commits were synced."
          else
            echo "No new commits found."
          fi

      - name: On failure
        if: failure()
        run: |
          echo "[Error] Due to a hard conflict with the upstream repo, Github actions could not autosync."
          exit 1
